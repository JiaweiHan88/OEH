<style>
/* OEH Design System */

@import url('https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap');

:root {
  /* Surfaces */
  --void: #000000;
  --bg-1: #0A0A0B;
  --bg-2: #111114;
  --bg-hi: #17171C;
  --bg-over: #1D1D23;

  /* Ink */
  --ink: #EFEDE6;
  --dim: rgba(239, 237, 230, 0.62);
  --mute: rgba(239, 237, 230, 0.38);
  --faint: rgba(239, 237, 230, 0.18);
  --hair: rgba(255, 255, 255, 0.06);
  --hair-2: rgba(255, 255, 255, 0.10);

  /* Agent accents */
  --signal: #7EC4FF;   /* companion / primary action */
  --defect: #F3C352;   /* defect analysis */
  --review: #8BDCA5;   /* code review */
  --analytics: #C2A6FA;/* PO analytics */
  --danger: #F27A6B;

  /* Radii */
  --r-1: 5px;
  --r-2: 6px;
  --r-3: 10px;
  --r-4: 14px;

  /* Motion */
  --mo-fast: 120ms cubic-bezier(0.2, 0, 0.2, 1);
  --mo: 200ms cubic-bezier(0.2, 0, 0.2, 1);
  --mo-slow: 320ms cubic-bezier(0.2, 0, 0.2, 1);
}

* { box-sizing: border-box; }
html, body, #root { height: 100%; margin: 0; background: var(--void); color: var(--ink); }
body {
  font-family: 'Geist', system-ui, sans-serif;
  font-size: 14px;
  line-height: 1.45;
  font-weight: 400;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
  letter-spacing: -0.005em;
}

.mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-feature-settings: 'ss01' 1, 'cv11' 1; }

.label {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 10.5px;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  color: var(--mute);
  font-weight: 500;
}

.kbd {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  padding: 1px 5px;
  border: 1px solid var(--hair-2);
  border-radius: 3px;
  color: var(--dim);
  background: rgba(255,255,255,0.02);
}

/* Scrollbars */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 10px; border: 3px solid transparent; background-clip: padding-box; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.14); background-clip: padding-box; border: 3px solid transparent; }

/* Selection */
::selection { background: rgba(126, 196, 255, 0.25); color: var(--ink); }

/* Focus */
button, input, textarea { font-family: inherit; color: inherit; }
button { cursor: pointer; background: none; border: 0; padding: 0; color: inherit; font-size: inherit; }
input:focus, textarea:focus, button:focus { outline: none; }
textarea { resize: none; }

/* Reusable primitives */
.card {
  background: var(--bg-2);
  border: 1px solid var(--hair);
  border-radius: var(--r-3);
  transition: border-color var(--mo), background var(--mo);
}
.card.hover:hover { border-color: var(--hair-2); background: var(--bg-hi); }

.hair { border-color: var(--hair); }

.pulse {
  animation: pulse 1.6s ease-in-out infinite;
}
@keyframes pulse { 0%, 100% { opacity: 0.9; } 50% { opacity: 0.35; } }

.blink { animation: blink 1.1s steps(2, start) infinite; }
@keyframes blink { to { opacity: 0; } }

@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}

.dot {
  width: 6px; height: 6px; border-radius: 50%;
  display: inline-block;
  box-shadow: 0 0 12px currentColor;
}

/* Fade-in on mount */
.fade-in { animation: fadeIn 240ms cubic-bezier(0.2, 0, 0.2, 1); }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

.slide-in { animation: slideIn 280ms cubic-bezier(0.2, 0, 0.2, 1); }
@keyframes slideIn { from { opacity: 0; transform: translateX(8px); } to { opacity: 1; transform: none; } }

/* Glow halo for premium card treatments */
.halo-defect { background: radial-gradient(ellipse at top right, rgba(243,195,82,0.10), transparent 60%); }
.halo-review { background: radial-gradient(ellipse at top right, rgba(139,220,165,0.10), transparent 60%); }
.halo-signal { background: radial-gradient(ellipse at top right, rgba(126,196,255,0.10), transparent 60%); }
.halo-analytics { background: radial-gradient(ellipse at top right, rgba(194,166,250,0.10), transparent 60%); }

/* Button primitive */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 10px;
  border-radius: var(--r-2);
  font-size: 12.5px;
  font-weight: 500;
  color: var(--ink);
  transition: background var(--mo-fast), border-color var(--mo-fast), color var(--mo-fast);
  border: 1px solid transparent;
  white-space: nowrap;
}
.btn:hover { background: var(--hair-2); }
.btn.ghost { color: var(--dim); }
.btn.ghost:hover { color: var(--ink); background: var(--hair); }
.btn.primary {
  background: var(--signal); color: #001020;
  font-weight: 500;
}
.btn.primary:hover { background: #A8D7FF; }
.btn.outline { border-color: var(--hair-2); }
.btn.outline:hover { border-color: var(--faint); background: var(--hair); }

/* Chip / tag */
.chip {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 2px 7px;
  border-radius: 3px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  letter-spacing: 0.03em;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--hair);
  color: var(--dim);
}

.divider-h { height: 1px; background: var(--hair); }
.divider-v { width: 1px; background: var(--hair); align-self: stretch; }

/* Caret blink for composer prompt hints */
.carat-blink::after {
  content: '▍';
  margin-left: 2px;
  animation: blink 1.1s steps(2, start) infinite;
  color: var(--signal);
}

// Type out an animation for the agent response
function useTypewriter(text, speed = 10, enabled = true) {
  const [out, setOut] = React.useState(enabled ? '' : text);
  React.useEffect(() => {
    if (!enabled) { setOut(text); return; }
    setOut('');
    let i = 0;
    const id = setInterval(() => {
      i += Math.max(1, Math.floor(text.length / 80));
      setOut(text.slice(0, i));
      if (i >= text.length) clearInterval(id);
    }, speed);
    return () => clearInterval(id);
  }, [text, speed, enabled]);
  return out;
}

function WorkspaceView({ activeWorkspace, setView }) {
  const ws = WORKSPACES.find(w => w.id === activeWorkspace) || WORKSPACES[0];
  const [contextOpen, setContextOpen] = React.useState(true);
  const [hoveredCite, setHoveredCite] = React.useState(null);
  const [composerText, setComposerText] = React.useState('');
  const [messages, setMessages] = React.useState(() => seedMessagesFor(ws.id));
  const [pending, setPending] = React.useState(false);
  const [agentSel, setAgentSel] = React.useState(ws.agent);
  const scrollRef = React.useRef(null);

  React.useEffect(() => {
    setMessages(seedMessagesFor(ws.id));
    setAgentSel(ws.agent);
  }, [ws.id]);

  React.useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [messages, pending]);

  const onCite = (id, show, click) => {
    setHoveredCite(show ? id : null);
    if (click) {
      const el = document.querySelector(`[data-source="${id}"]`);
      if (el) el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }
  };

  const send = () => {
    if (!composerText.trim()) return;
    const text = composerText.trim();
    setMessages(m => [...m, { role: 'user', text }]);
    setComposerText('');
    setPending(true);
    setTimeout(() => {
      setMessages(m => [...m, { role: 'agent', kind: 'followup', agent: agentSel, text }]);
      setPending(false);
    }, 1400);
  };

  return (
    <div style={{ flex: 1, display: 'flex', minHeight: 0, background: 'var(--bg-1)' }}>
      {/* Thread list */}
      <ThreadList activeId={ws.id} onPick={() => {}} />

        {/* Workspace header */}
        <div style={{
          padding: '12px 24px',
          borderBottom: '1px solid var(--hair)',
          display: 'flex', alignItems: 'center', gap: 12,
          flexShrink: 0,
        }}>
          <AgentDot kind={ws.agent} />
          <div style={{ minWidth: 0, flex: 1 }}>
            <div style={{ fontSize: 14, color: 'var(--ink)', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
              {ws.title}
            </div>
            <div className="mono" style={{ fontSize: 10.5, color: 'var(--mute)', letterSpacing: '0.04em' }}>
              {ws.id.toUpperCase()} · {ws.sources} sources
            </div>
          </div>
          <AgentSelector value={agentSel} onChange={setAgentSel} />
          <button className="btn ghost" onClick={() => setContextOpen(c => !c)} title="Toggle context panel">
            <Icon name={contextOpen ? 'panel-r' : 'panel-l'} size={14}/>
          </button>
        </div>

        {/* Message stream */}
        <div ref={scrollRef} style={{
          flex: 1, overflow: 'auto',
          padding: '20px 24px 10px',
        }}>
          <div style={{ maxWidth: 820, margin: '0 auto', display: 'flex', flexDirection: 'column', gap: 16 }}>
            {messages.map((m, i) => <Message key={i} m={m} onCite={onCite}/>)}
            {pending && <ThinkingIndicator agent={agentSel}/>}
          </div>
        </div>

        {/* Composer */}
        <Composer
          value={composerText}
          onChange={setComposerText}
          onSend={send}
          agent={agentSel}
        />
      </div>

      {/* Context panel */}
      {contextOpen && <ContextPanel hoveredCite={hoveredCite} />}
    </div>
  );
}

// ── Radial tool graph ────────────────────────────────────────────────
function RadialToolGraph({ agent }) {
  const connectors = CONNECTORS.concat([{ id: 'dlt', name: 'DLT', icon: 'log', status: 'connected', tools: 6 }]);
  const activeConnectors = connectors.filter(c => c.status !== 'disconnected');
  const [focused, setFocused] = React.useState(null);
  const accent = `var(--${agent.kind})`;

  // Default: toggle state by tool key
  const [enabled, setEnabled] = React.useState(() => {
    const e = {};
    activeConnectors.forEach(c => {
      (AGENT_TOOLS[c.id] || []).forEach((t, i) => {
        e[`${c.id}.${t}`] = i < 3; // first 3 enabled by default
      });
    });
    return e;
  });

  const toggle = k => setEnabled(s => ({ ...s, [k]: !s[k] }));
  const toggleAll = (cid, on) => {
    setEnabled(s => {
      const next = { ...s };
      (AGENT_TOOLS[cid] || []).forEach(t => next[`${cid}.${t}`] = on);
      return next;
    });
  };

  const cx = 260, cy = 260, R = 180;
  const n = activeConnectors.length;
  const focusedC = focused ? activeConnectors.find(c => c.id === focused) : null;

  return (
    <div style={{ display: 'flex', gap: 24, alignItems: 'flex-start', minHeight: 560 }}>
      {/* Graph */}
      <div style={{
        width: 560, height: 560, position: 'relative', flexShrink: 0,
        background: 'radial-gradient(ellipse at center, rgba(126,196,255,0.04), transparent 60%)',
        border: '1px solid var(--hair)', borderRadius: 12,
      }}>
        <svg width="520" height="520" viewBox="0 0 520 520" style={{ position: 'absolute', inset: 20 }}>
          {/* Rings */}
          {[R-50, R, R+40].map(r => (
            <circle key={r} cx={cx} cy={cy} r={r} fill="none" stroke="var(--hair)" strokeDasharray="2 5"/>
          ))}
          {/* Connector links */}
          {activeConnectors.map((c, i) => {
            const angle = (i / n) * Math.PI * 2 - Math.PI / 2;
            const x = cx + Math.cos(angle) * R;
            const y = cy + Math.sin(angle) * R;
            const isFoc = focused === c.id;
            return (
              <line key={c.id} x1={cx} y1={cy} x2={x} y2={y}
                stroke={isFoc ? accent : 'var(--hair-2)'}
                strokeWidth={isFoc ? 1.5 : 1}
                strokeDasharray={focused && !isFoc ? '3 4' : 'none'}
                opacity={focused && !isFoc ? 0.4 : 1}
              />
            );
          })}
          {/* Tool links (when connector focused) */}
          {focusedC && (() => {
            const focIdx = activeConnectors.findIndex(c => c.id === focused);
            const focAngle = (focIdx / n) * Math.PI * 2 - Math.PI / 2;
            const fx = cx + Math.cos(focAngle) * R;
            const fy = cy + Math.sin(focAngle) * R;
            const tools = AGENT_TOOLS[focused] || [];
            const spread = Math.min(Math.PI * 0.75, tools.length * 0.14);
            return tools.map((t, i) => {
              const base = focAngle;
              const a = base + ((i - (tools.length - 1) / 2) * spread) / Math.max(tools.length, 1);
              const tx = fx + Math.cos(a) * 90;
              const ty = fy + Math.sin(a) * 90;
              const on = enabled[`${focused}.${t}`];
              return (
                <g key={t}>
                  <line x1={fx} y1={fy} x2={tx} y2={ty} stroke={on ? accent : 'var(--hair-2)'} strokeWidth="1" opacity={on ? 0.9 : 0.5}/>
                  <circle cx={tx} cy={ty} r={4} fill={on ? accent : 'var(--bg-hi)'} stroke={on ? accent : 'var(--hair-2)'} strokeWidth="1"/>
                  <text x={tx + 8} y={ty + 3} fill={on ? 'var(--ink)' : 'var(--mute)'} fontSize="10" fontFamily="JetBrains Mono, monospace">{t}</text>
                </g>
              );
            });
          })()}
        </svg>

        {/* Connector nodes (positioned absolutely so they click) */}
        {activeConnectors.map((c, i) => {
          const angle = (i / n) * Math.PI * 2 - Math.PI / 2;
          const x = cx + Math.cos(angle) * R;
          const y = cy + Math.sin(angle) * R;
          const isFoc = focused === c.id;
          const dim = focused && !isFoc;
          return (
            <button key={c.id}
              onClick={() => setFocused(f => f === c.id ? null : c.id)}
              style={{
                position: 'absolute',
                left: 20 + x - 22, top: 20 + y - 22,
                width: 44, height: 44,
                borderRadius: 10,
                background: isFoc ? 'var(--bg-hi)' : 'var(--bg-2)',
                border: `1px solid ${isFoc ? accent : 'var(--hair-2)'}`,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                color: isFoc ? accent : 'var(--ink)',
                opacity: dim ? 0.45 : 1,
                boxShadow: isFoc ? `0 0 0 4px rgba(255,255,255,0.04), 0 0 24px ${accent}` : 'none',
                transition: 'all 160ms',
              }}
              title={`${c.name} · ${(AGENT_TOOLS[c.id] || []).length} tools`}
            >
              <Icon name={c.icon} size={18}/>
            </button>
          );
        })}

        {/* Center: agent */}
        <div style={{
          position: 'absolute', left: 20 + cx - 42, top: 20 + cy - 42,
          width: 84, height: 84, borderRadius: 16,
          background: 'var(--bg-hi)',
          border: `1px solid ${accent}`,
          display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
          color: accent,
          boxShadow: `0 0 48px ${accent}33`,
        }}>
          <AgentDot kind={agent.kind} size={10}/>
          <div className="mono" style={{ fontSize: 10, marginTop: 6, letterSpacing: '0.06em', color: 'var(--ink)' }}>{agent.name.toUpperCase()}</div>
          <div className="mono" style={{ fontSize: 9, color: 'var(--mute)', marginTop: 2 }}>

// ── Reusable Modal ──────────────────────────────────────────────────
function Modal({ onClose, children, width = 560 }) {
  React.useEffect(() => {
    const h = e => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, [onClose]);
  return (
    <div style={{
      position: 'fixed', inset: 0, zIndex: 200,
      background: 'rgba(0,0,0,0.6)',
      backdropFilter: 'blur(4px)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      animation: 'fadeIn 160ms ease-out',
    }} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} className="fade-in" style={{
        width, maxWidth: '92vw',
        background: 'var(--bg-hi)', border: '1px solid var(--hair-2)',
        borderRadius: 12, overflow: 'hidden',
        boxShadow: '0 40px 80px -16px rgba(0,0,0,0.7)',
        position: 'relative',
      }}>
        <button onClick={onClose} style={{
          position: 'absolute', top: 14, right: 14, zIndex: 2,
          color: 'var(--mute)', padding: 4,
        }}><Icon name="close" size={14}/></button>
        {children}
      </div>
    </div>
  );
}

function FakeChart() {
  // Generates SVG area chart with 4 agent lines
  const W = 680, H = 160;
  const pts = (seed, n = 24) => {
    const arr = [];
    let v = 20 + seed * 8;
    for (let i = 0; i < n; i++) {
      v += (Math.sin(i * 0.6 + seed) + Math.cos(i * 0.3 + seed * 2)) * 8;
      v = Math.max(5, Math.min(95, v));
      arr.push({ x: (i / (n - 1)) * W, y: H - (v / 100) * H });
    }
    return arr;
  };
  const toPath = (arr) => 'M ' + arr.map(p => `${p.x} ${p.y}`).join(' L ');
  const lines = [
    { pts: pts(1), c: 'var(--signal)' },
    { pts: pts(3), c: 'var(--defect)' },
    { pts: pts(5), c: 'var(--review)' },
    { pts: pts(2), c: 'var(--analytics)' },
  ];
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', height: 180, overflow: 'visible' }}>
      {[0.25, 0.5, 0.75].map(f => (
        <line key={f} x1={0} y1={H*f} x2={W} y2={H*f} stroke="var(--hair)" strokeDasharray="2 4"/>
      ))}
      {lines.map((l, i) => (
        <path key={i} d={toPath(l.pts)} fill="none" stroke={l.c} strokeWidth="1.4" strokeLinejoin="round"/>
      ))}
    </svg>
  );
}

            color: tab === t.id ? 'var(--ink)' : 'var(--mute)',
            background: tab === t.id ? 'var(--hair)' : 'transparent',
            fontSize: 13,
          }}>
            <Icon name={t.icon} size={14}/> {t.label}
          </button>
        ))}
      </div>
      <div style={{ flex: 1, overflow: 'auto', padding: '28px 40px' }}>
        <div style={{ maxWidth: 720 }}>
          <Label>{tab}</Label>
          <h1 style={{ fontWeight: 300, fontSize: 28, margin: '6px 0 20px', letterSpacing: '-0.02em' }}>
            {TABS.find(x=>x.id===tab).label} settings
          </h1>
          <div style={{ color: 'var(--dim)', fontSize: 13, marginBottom: 20 }}>
            All configuration lives here. Nothing duplicated in the top bar.
          </div>
          {tab === 'account' && <AccountSettings/>}
          {tab === 'workspace' && <WorkspaceSettings/>}
          {tab === 'billing' && <BillingSettings/>}
          {['connectors','agents','advanced'].includes(tab) && (
            <div className="card" style={{ padding: 18, color: 'var(--dim)', fontSize: 13 }}>
              See the dedicated <span style={{color:'var(--signal)'}}>{TABS.find(x=>x.id===tab).label}</span> area in the sidebar — deep config lives there. This tab links to per-workspace overrides.
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function AccountSettings() {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
      <SettingRow label="Display name" value="Jiawei Han" />
      <SettingRow label="Email" value="jiawei.han@innosprint.com" />
      <SettingRow label="Default team" value="hvac-team" />
      <SettingRow label="Keyboard scheme" value="⌘ macOS · ⌥ vim-lite" />
    </div>
  );
}
function WorkspaceSettings() {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
      <SettingRow label="Org" value="innosprint-auto" />
      <SettingRow label="Retention" value="90 days · chat · uploads" />
      <SettingRow label="Data residency" value="eu-central-1" />
    </div>
  );
}
function BillingSettings() {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
      <SettingRow label="Plan" value="Team · self-hosted" />
      <SettingRow label="Seats" value="42 of 60" />
      <SettingRow label="Monthly LLM" value="$842 / $3,500 cap" />
    </div>
  );
}
function SettingRow({ label, value }) {
  return (
    <div className="card" style={{ padding: '14px 18px', display: 'flex', alignItems: 'center', gap: 14 }}>
      <span className="label" style={{ width: 160 }}>{label}</span>
      <span style={{ flex: 1, color: 'var(--ink)', fontSize: 13 }}>{value}</span>
      <button className="btn ghost" style={{ fontSize: 12 }}>Edit</button>
    </div>
  );
}

Object.assign(window, { ConnectorsView, AdminView, AgentsView, LoginView, SettingsView });

// == tweaks.jsx ==
// tweaks.jsx — editable mode panel

function TweaksPanel({ tweaks, setTweaks, onClose }) {
  const update = (k, v) => {
    const next = { ...tweaks, [k]: v };
    setTweaks(next);
    try {
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
    } catch {}
  };

  return (
    <div style={{
      position: 'fixed', bottom: 20, right: 20, zIndex: 100,
      width: 300,
      background: 'var(--bg-hi)', border: '1px solid var(--hair-2)', borderRadius: 10,
      boxShadow: '0 24px 48px -12px rgba(0,0,0,0.6)',
      color: 'var(--ink)',
      overflow: 'hidden',
    }}>
      <div style={{ display: 'flex', alignItems: 'center', padding: '10px 14px', borderBottom: '1px solid var(--hair)' }}>
        <Label style={{ flex: 1 }}>Tweaks</Label>
        <button onClick={onClose} className="btn ghost" style={{ padding: 3 }}><Icon name="close" size={12}/></button>
      </div>
      <div style={{ padding: '14px 16px', display: 'flex', flexDirection: 'column', gap: 14 }}>
        <TweakGroup label="Density">
          {['compact', 'comfortable', 'dense'].map(opt => (
            <TweakPill key={opt} active={tweaks.density === opt} onClick={() => update('density', opt)}>{opt}</TweakPill>
          ))}
        </TweakGroup>
        <TweakGroup label="Sidebar">
          {['narrow', 'wide'].map(opt => (
            <TweakPill key={opt} active={tweaks.sidebar === opt} onClick={() => update('sidebar', opt)}>{opt}</TweakPill>
          ))}
        </TweakGroup>
        <TweakGroup label="Accent">
          {[['signal','#7EC4FF'],['defect','#F3C352'],['review','#8BDCA5'],['analytics','#C2A6FA']].map(([k, c]) => (
            <button key={k} onClick={() => update('accent', k)} title={k}
              style={{ width: 22, height: 22, borderRadius: 4, background: c, border: tweaks.accent === k ? '2px solid var(--ink)' : '1px solid var(--hair-2)' }}/>
          ))}
        </TweakGroup>
        <TweakGroup label="Theme">
          {['dark', 'light'].map(opt => (
            <TweakPill key={opt} active={tweaks.theme === opt} onClick={() => update('theme', opt)}>{opt}</TweakPill>
          ))}
        </TweakGroup>
        <TweakGroup label="Motion">
          {['off', 'subtle', 'full'].map(opt => (
            <TweakPill key={opt} active={tweaks.motion === opt} onClick={() => update('motion', opt)}>{opt}</TweakPill>
          ))}
        </TweakGroup>
      </div>
    </div>
  );
}

function TweakGroup({ label, children }) {
  return (
    <div>
      <div className="mono" style={{ fontSize: 10, color: 'var(--mute)', letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 6 }}>{label}</div>
      <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap' }}>{children}</div>
    </div>
  );
}

function TweakPill({ active, onClick, children }) {
  return (
    <button onClick={onClick} style={{
      padding: '4px 10px', borderRadius: 4,
      fontSize: 11,
      background: active ? 'var(--ink)' : 'var(--bg-2)',
      color: active ? '#000' : 'var(--dim)',
      border: '1px solid var(--hair-2)',
      textTransform: 'lowercase',
    }}>{children}</button>
  );
}

Object.assign(window, { TweaksPanel });

</script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "density": "comfortable",
  "sidebar": "wide",
  "accent": "signal",
  "theme": "dark",
  "motion": "full"
}/*EDITMODE-END*/;

const LOGIN_KEY = 'oeh.authed';
const VIEW_KEY = 'oeh.view';
const WS_KEY = 'oeh.ws';

function App() {
  const [authed, setAuthed] = React.useState(() => {
    try { return localStorage.getItem(LOGIN_KEY) === '1'; } catch { return false; }
  });
  const [view, setView] = React.useState(() => {
    try { return localStorage.getItem(VIEW_KEY) || 'dashboard'; } catch { return 'dashboard'; }
  });
  const [activeWorkspace, setActiveWorkspace] = React.useState(() => {
    try { return localStorage.getItem(WS_KEY) || 'ws-1'; } catch { return 'ws-1'; }
  });
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
  const [tweaksOpen, setTweaksOpen] = React.useState(false);

  React.useEffect(() => { try { localStorage.setItem(VIEW_KEY, view); } catch {} }, [view]);
  React.useEffect(() => { try { localStorage.setItem(WS_KEY, activeWorkspace); } catch {} }, [activeWorkspace]);
  React.useEffect(() => {
    try { localStorage.setItem(LOGIN_KEY, authed ? '1' : '0'); } catch {}
  }, [authed]);

  // Edit mode integration + keyboard shortcut
  React.useEffect(() => {
    const handler = (e) => {
      if (!e || !e.data || typeof e.data !== 'object') return;
      if (e.data.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    const keyHandler = (e) => {
      if (e.key === '.' && (e.metaKey || e.ctrlKey)) {
        e.preventDefault();
        setTweaksOpen(o => !o);
      }
    };
    window.addEventListener('message', handler);
    window.addEventListener('keydown', keyHandler);
    try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch {}
    return () => { window.removeEventListener('message', handler); window.removeEventListener('keydown', keyHandler); };
  }, []);

  // Apply accent override
  React.useEffect(() => {
    const accents = { signal: '#7EC4FF', defect: '#F3C352', review: '#8BDCA5', analytics: '#C2A6FA' };
    document.documentElement.style.setProperty('--accent', accents[tweaks.accent] || accents.signal);
    // Apply theme
    if (tweaks.theme === 'light') {
      document.documentElement.style.setProperty('--void', '#F5F3EE');
      document.documentElement.style.setProperty('--bg-1', '#FAF8F3');
      document.documentElement.style.setProperty('--bg-2', '#FFFFFF');
      document.documentElement.style.setProperty('--bg-hi', '#F0EEE7');
      document.documentElement.style.setProperty('--ink', '#18181B');
      document.documentElement.style.setProperty('--dim', 'rgba(24,24,27,0.7)');
      document.documentElement.style.setProperty('--mute', 'rgba(24,24,27,0.5)');
      document.documentElement.style.setProperty('--faint', 'rgba(24,24,27,0.25)');
      document.documentElement.style.setProperty('--hair', 'rgba(0,0,0,0.06)');
      document.documentElement.style.setProperty('--hair-2', 'rgba(0,0,0,0.12)');
    } else {
      document.documentElement.style.setProperty('--void', '#000000');
      document.documentElement.style.setProperty('--bg-1', '#0A0A0B');
      document.documentElement.style.setProperty('--bg-2', '#111114');
      document.documentElement.style.setProperty('--bg-hi', '#17171C');
      document.documentElement.style.setProperty('--ink', '#EFEDE6');
      document.documentElement.style.setProperty('--dim', 'rgba(239,237,230,0.62)');
      document.documentElement.style.setProperty('--mute', 'rgba(239,237,230,0.38)');
      document.documentElement.style.setProperty('--faint', 'rgba(239,237,230,0.18)');
      document.documentElement.style.setProperty('--hair', 'rgba(255,255,255,0.06)');
      document.documentElement.style.setProperty('--hair-2', 'rgba(255,255,255,0.10)');
    }
    // Density
    const d = tweaks.density;
    document.body.style.fontSize = d === 'compact' ? '13px' : d === 'dense' ? '12.5px' : '14px';
    // Motion
    if (tweaks.motion === 'off') {
      document.documentElement.style.setProperty('--mo-fast', '0ms');
      document.documentElement.style.setProperty('--mo', '0ms');
      document.documentElement.style.setProperty('--mo-slow', '0ms');
    } else {
      document.documentElement.style.setProperty('--mo-fast', tweaks.motion === 'subtle' ? '80ms linear' : '120ms cubic-bezier(0.2,0,0.2,1)');
      document.documentElement.style.setProperty('--mo', tweaks.motion === 'subtle' ? '120ms linear' : '200ms cubic-bezier(0.2,0,0.2,1)');
      document.documentElement.style.setProperty('--mo-slow', tweaks.motion === 'subtle' ? '180ms linear' : '320ms cubic-bezier(0.2,0,0.2,1)');
    }
  }, [tweaks]);

  if (!authed) {
    return <div style={{ height: '100%', display: 'flex', background: '#000' }}><LoginView onIn={() => { setView('dashboard'); setAuthed(true); }} /></div>;
  }

  const ws = WORKSPACES.find(w => w.id === activeWorkspace) || WORKSPACES[0];
  const viewCrumbs = {
    dashboard: ['01 · WORKSPACES · DASHBOARD + TEMPLATES', '/WORKSPACES'],
    workspace: ['02 · WORKSPACE · CHAT-FIRST WITH CONTEXT PANEL', `/WORKSPACES/${ws.id.toUpperCase()}`],
    agents: ['03 · AGENTS · TOOL + SKILL CONFIG', '/AGENTS'],
    connectors: ['04 · CONNECTORS · ENGINEERING SYSTEMS', '/CONNECTORS'],
    admin: ['05 · ADMIN · PLATFORM HEALTH', '/ADMIN'],
    settings: ['06 · SETTINGS', '/SETTINGS'],
  };
  const crumbs = viewCrumbs[view] || viewCrumbs.dashboard;

  return (
    <div style={{ height: '100%', display: 'flex', background: 'var(--void)' }}>
      <Sidebar view={view} setView={setView} sidebarWide={tweaks.sidebar === 'wide'} onLogout={() => setAuthed(false)} />
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0 }}>
        <TopBar
          crumbs={crumbs}
          center={<CommandPaletteButton onClick={()=>{}} />}
          right={<>
            <button className="btn ghost" style={{padding:'5px 8px'}} title="Activity"><Icon name="hist" size={14}/></button>
            <button className="btn ghost" style={{padding:'5px 8px'}} title="What's new"><Icon name="sparkle" size={14}/></button>
            <button className="btn ghost" style={{padding:'5px 8px'}} title="Toggle theme" onClick={() => setTweaks(t => ({...t, theme: t.theme === 'dark' ? 'light' : 'dark'}))}><Icon name={tweaks.theme === 'dark' ? 'eye' : 'eye-off'} size={14}/></button>
          </>}
        />
        <div style={{ flex: 1, display: 'flex', minHeight: 0 }}>
          {view === 'dashboard' && <DashboardView setView={setView} setActiveWorkspace={setActiveWorkspace} />}
          {view === 'workspace' && <WorkspaceView activeWorkspace={activeWorkspace} setView={setView} />}
          {view === 'agents' && <AgentsView />}
          {view === 'connectors' && <ConnectorsView />}
          {view === 'admin' && <AdminView />}
          {view === 'settings' && <SettingsView />}
        </div>
      </div>
      {tweaksOpen && <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} onClose={()=>setTweaksOpen(false)} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
