document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

div>\n              <div style=\"font-size:10px;color:#9a8a5a;margin-top:4px\">judgment · validates<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;align-items:center;font-size:15px;color:#7a9b97;font-weight:700\">+<\u002Fdiv>\n            <div style=\"flex:1;border:1px solid #1f5d57;border-radius:7px;background:rgba(47,227,207,.07);padding:11px 12px;text-align:center\">\n              <div style=\"font-size:15px;font-weight:700;color:#7df2e4\">AI Agent<\u002Fdiv>\n              <div style=\"font-size:10px;color:#5f9b96;margin-top:4px\">retrieval · reasoning<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:7px;margin-top:12px;justify-content:center\">\n            <div style=\"font-size:10px;letter-spacing:.12em;color:#7df2e4;border:1px solid #1f5d57;border-radius:3px;padding:3px 11px\">USER A<\u002Fdiv>\n            <div style=\"font-size:10px;letter-spacing:.12em;color:#6f8f8b;border:1px solid #1f3f3c;border-radius:3px;padding:3px 11px\">B<\u002Fdiv>\n            <div style=\"font-size:10px;letter-spacing:.12em;color:#6f8f8b;border:1px solid #1f3f3c;border-radius:3px;padding:3px 11px\">C<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div data-node=\"archOutcome\" style=\"position:absolute;opacity:0\">\n          <div style=\"font-size:10px;letter-spacing:.2em;color:#8a877f;text-transform:uppercase\">// outcome<\u002Fdiv>\n          <div style=\"font-size:19px;font-weight:800;color:#6effaa;margin-top:7px\">High Quality<\u002Fdiv>\n          <div style=\"font-size:11px;color:#8a877f;margin-top:5px\">validated, auditable<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div data-node=\"archContext\" style=\"position:absolute;opacity:0\">\n          <div style=\"display:flex;justify-content:space-between;align-items:baseline\">\n            <div style=\"font-size:12px;letter-spacing:.2em;color:#c8b8ff;text-transform:uppercase;font-weight:700\">context platform<\u002Fdiv>\n            <div style=\"font-size:9px;letter-spacing:.14em;color:#7a749a;text-transform:uppercase\">system-managed · shared<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px\">\n            <div style=\"border:1px solid #2f2b3a;border-radius:5px;background:rgba(200,184,255,.05);padding:11px 10px;text-align:center;font-size:13px;color:#cfc7e8\">Documentation<\u002Fdiv>\n            <div style=\"border:1px solid #2f2b3a;border-radius:5px;background:rgba(200,184,255,.05);padding:11px 10px;text-align:center;font-size:13px;color:#cfc7e8\">Code<\u002Fdiv>\n            <div style=\"border:1px solid #2f2b3a;border-radius:5px;background:rgba(200,184,255,.05);padding:11px 10px;text-align:center;font-size:13px;color:#cfc7e8\">Tickets<\u002Fdiv>\n            <div style=\"border:1px solid #2f2b3a;border-radius:5px;background:rgba(200,184,255,.05);padding:11px 10px;text-align:center;font-size:13px;color:#cfc7e8\">World knowledge<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div data-node=\"archTacit\" style=\"position:absolute;opacity:0\">\n          <div style=\"display:flex;justify-content:space-between;align-items:baseline\">\n            <div style=\"font-size:12px;letter-spacing:.2em;color:#ff8a3d;text-transform:uppercase;font-weight:700\">tacit knowledge<\u002Fdiv>\n            <div style=\"font-size:9px;letter-spacing:.14em;color:#9a7152;text-transform:uppercase\">user-managed · per user<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:10px;margin-top:16px\">\n            <div style=\"flex:1;border:1px solid #5a3a1e;border-radius:5px;background:rgba(255,138,61,.06);padding:12px 10px;text-align:center;font-size:13px;color:#f0ddc6\">memory<\u002Fdiv>\n            <div style=\"flex:1;border:1px solid #5a3a1e;border-radius:5px;background:rgba(255,138,61,.06);padding:12px 10px;text-align:center;font-size:13px;color:#f0ddc6\">skill<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:11px;color:#9a7152;margin-top:13px\">distilled from solving — a byproduct<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div data-node=\"archGov\" style=\"position:absolute;opacity:0\">\n          <svg viewBox=\"0 0 100 200\" style=\"position:absolute;inset:0;width:100%;height:100%;overflow:visible\">\n            <path d=\"M12,196 L12,46 Q12,12 50,12 Q88,12 88,46 L88,196\" fill=\"none\" stroke=\"#d4ff3a\" stroke-width=\"3\" style=\"filter:drop-shadow(0 0 5px rgba(212,255,58,.5))\"><\u002Fpath>\n            <line x1=\"50\" y1=\"12\" x2=\"50\" y2=\"150\" stroke=\"#d4ff3a\" stroke-width=\"1.4\" stroke-dasharray=\"3 6\" opacity=\"0.55\"><\u002Fline>\n          <\u002Fsvg>\n          <div style=\"position:absolute;bottom:-24px;left:-46px;width:160px;text-align:center;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#d4ff3a\">governance<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div data-node=\"archHive\" style=\"position:absolute;opacity:0\">\n          <div style=\"display:flex;justify-content:space-between;align-items:baseline\">\n            <div style=\"font-size:14px;letter-spacing:.22em;color:#d4ff3a;text-transform:uppercase;font-weight:800\">the hive<\u002Fdiv>\n            <div style=\"font-size:9px;letter-spacing:.14em;color:#7d8a4a;text-transform:uppercase\">org-wide · shared<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:10px;margin-top:16px\">\n            <div style=\"flex:1;border:1px solid #3f4a1e;border-radius:5px;background:rgba(212,255,58,.06);padding:12px 10px;text-align:center;font-size:13px;color:#dfe9b8\">validated skills<\u002Fdiv>\n            <div style=\"flex:1;border:1px solid #3f4a1e;border-radius:5px;background:rgba(212,255,58,.06);padding:12px 10px;text-align:center;font-size:13px;color:#dfe9b8\">validated memories<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div data-node=\"archL1\" style=\"position:absolute;opacity:0\">workspace<\u002Fdiv>\n        <div data-node=\"archL2\" style=\"position:absolute;opacity:0\">knowledge substrate<\u002Fdiv>\n        <div data-node=\"archL3\" style=\"position:absolute;opacity:0\">the hive · org<\u002Fdiv>\n\n        <div data-node=\"lblRetrieve\" style=\"position:absolute;opacity:0\">retrieve<\u002Fdiv>\n        <div data-node=\"lblDistill\" style=\"position:absolute;opacity:0\">distill<\u002Fdiv>\n        <div data-node=\"lblPromote\" style=\"position:absolute;opacity:0\">promote<\u002Fdiv>\n        <div data-node=\"lblShared\" style=\"position:absolute;opacity:0\">share back<\u002Fdiv>\n\n        <!-- BEAT 11: why solved problems are special (exploration tree) -->\n        <div data-node=\"treeP\" style=\"position:absolute;opacity:0\">the problem<\u002Fdiv>\n        <div data-node=\"treeRC\" style=\"position:absolute;opacity:0\">root cause<\u002Fdiv>\n        <div data-node=\"treeFX\" style=\"position:absolute;opacity:0\">fix applied<\u002Fdiv>\n        <div data-node=\"treeVAL\" style=\"position:absolute;opacity:0\">validated ✓<\u002Fdiv>\n        <div data-node=\"treeExplore\" style=\"position:absolute;opacity:0\">exploration<\u002Fdiv>\n        <div data-node=\"treePanel\" style=\"position:absolute;opacity:0\">\n          <div style=\"display:flex;align-items:center;gap:22px\">\n            <div style=\"font-size:19px;font-weight:700;color:#f3f1ea;white-space:nowrap\">the journey <span style=\"color:#ff8a3d\">is<\u002Fspan> the knowledge<\u002Fdiv>\n            <div style=\"display:flex;gap:9px;flex-wrap:wrap\">\n              <div style=\"font-size:13px;letter-spacing:.02em;color:#f0ddc6;border:1px solid #5a3a1e;border-radius:3px;background:rgba(255,138,61,.08);padding:5px 14px;white-space:nowrap\">reasoning<\u002Fdiv>\n              <div style=\"font-size:13px;letter-spacing:.02em;color:#f0ddc6;border:1px solid #5a3a1e;border-radius:3px;background:rgba(255,138,61,.08);padding:5px 14px;white-space:nowrap\">tradeoffs<\u002Fdiv>\n              <div style=\"font-size:13px;letter-spacing:.02em;color:#cc8b7f;border:1px dashed #5a3030;border-radius:3px;background:rgba(255,90,60,.06);padding:5px 14px;white-space:nowrap\">the dead ends<\u002Fdiv>\n              <div style=\"font-size:13px;letter-spacing:.02em;color:#f0ddc6;border:1px solid #5a3a1e;border-radius:3px;background:rgba(255,138,61,.08);padding:5px 14px;white-space:nowrap\">the distinguishing pattern<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:13px;color:#9a7152;margin-top:14px;letter-spacing:.02em\">not documentation — reasoning artifacts captured as a byproduct of solving<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div data-node=\"caption\" style=\"position:absolute;opacity:0\">{{ captionText }}<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"position:absolute; top:56px; left:80px; z-index:80; font-size:13px; letter-spacing:0.24em; text-transform:uppercase; color:#5a5852;\">openengineeringhub <span style=\"color:#d4ff3a;\">// origin<\u002Fspan><\u002Fdiv>\n      <div style=\"position:absolute; bottom:28px; left:80px; z-index:80; font-size:13px; letter-spacing:0.22em; color:#8a877f;\">{{ kicker }}<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  rootRef = React.createRef();\n  wrapRef = React.createRef();\n\n  BEATS = [\n    { id: \"B0\",  kicker: \"beat_00 // thesis\" },\n    { id: \"B1\",  kicker: \"beat_01 // the atomic unit\" },\n    { id: \"B2\",  kicker: \"beat_02 // a specific issue\" },\n    { id: \"B3\",  kicker: \"beat_03 // the agent\" },\n    { id: \"B4\",  kicker: \"beat_04 // human + agent\" },\n    { id: \"B11\", kicker: \"beat_05 // why solved problems are special\" },\n    { id: \"B7\",  kicker: \"beat_06 // knowledge distillation\" },\n    { id: \"B8\",  kicker: \"beat_07 // the collective gap\" },\n    { id: \"B9\",  kicker: \"beat_07 // the hive with governance\" },\n    { id: \"B10\", kicker: \"beat_08 // openengineeringhub\" },\n  ];\n\n  // intra-slide click steps: beat is just the slide position; a beat can reveal over several clicks\n  STEPS = { B1: 2, B2: 2, B4: 1, B7: 1, B11: 3, B8: 2, B9: 1 };\n  maxStep(b) { return this.STEPS[this.BEATS[b].id] || 0; }\n\n  state = { beat: (() => { const n = parseInt(new URLSearchParams(location.search).get(\"beat\"), 10); const max = this.BEATS.length - 1; return (Number.isFinite(n) && n >= 0) ? Math.min(n, max) : 0; })(), step: 0, tacitIdx: 0 };\n\n  componentDidMount() {\n    this.fit();\n    this._onResize = () => this.fit();\n    this._onKey = (e) => {\n      if (e.key === \"ArrowRight\" || e.key === \" \" || e.key === \"Enter\" || e.key === \"PageDown\") { e.preventDefault(); this.go(1); }\n      else if (e.key === \"ArrowLeft\" || e.key === \"PageUp\") { e.preventDefault(); this.go(-1); }\n      else if (e.key === \"0\" || e.key === \"Home\") { e.preventDefault(); this.setState({ beat: 0, step: 0 }, () => this.paint()); }\n    };\n    window.addEventListener(\"resize\", this._onResize);\n    window.addEventListener(\"keydown\", this._onKey);\n    // cycle the tacit-knowledge cloud only while it is on screen (B2, step >= 1)\n    this._tick = setInterval(() => {\n      const bid = this.BEATS[this.state.beat].id;\n      if ((bid === \"B2\" && this.state.step >= 1) || bid === \"B4\" || (bid === \"B7\" && this.state.step === 0)) {\n        this.setState((s) => ({ tacitIdx: s.tacitIdx + 1 }));\n      }\n    }, 1900);\n    // per-frame reconciler: keeps imperative node styles applied even when React\n    // re-asserts the static template style on a hidden→visible transition.\n    const loop = () => { this.paint(); this._raf = requestAnimationFrame(loop); };\n    this._raf = requestAnimationFrame(loop);\n    this.paint();\n  }\n  componentWillUnmount() {\n    window.removeEventListener(\"resize\", this._onResize);\n    window.removeEventListener(\"keydown\", this._onKey);\n    clearInterval(this._tick);\n    cancelAnimationFrame(this._raf);\n  }\n  componentDidUpdate() {}\n  fit() {\n    const s = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);\n    if (this.wrapRef.current) this.wrapRef.current.style.transform = `scale(${s})`;\n  }\n  go(d) {\n    let { beat, step } = this.state;\n    const prevId = this.BEATS[beat].id;\n    if (d > 0) {\n      if (step < this.maxStep(beat)) step++;\n      else if (beat < this.BEATS.length - 1) { beat++; step = 0; }\n    } else {\n      if (step > 0) step--;\n      else if (beat > 0) { beat--; step = this.maxStep(beat); }\n    }\n    const nextId = this.BEATS[beat].id;\n    if (nextId !== prevId) {\n      if (nextId === \"B3\") this._flipStart = performance.now();\n      if (nextId === \"B4\") this._mergeStart = performance.now();\n    }\n    this.setState({ beat, step }, () => this.paint());\n  }\n  paint() {\n    const root = this.rootRef.current;\n    if (!root) return;\n    const L = this._live || { beat: this.state.beat, step: this.state.step, tacitIdx: this.state.tacitIdx };\n    const bid = this.BEATS[L.beat].id;\n    if (bid !== this._prevBid) this._prevBid = bid;\n    const S = this.compute(bid, L.step);\n    Object.keys(S).forEach((k) => {\n      if (!k.endsWith(\"Style\")) return;\n      const el = root.querySelector(`[data-node=\"${k.slice(0, -5)}\"]`);\n      if (el && el.style.cssText !== S[k]) el.style.cssText = S[k];\n    });\n\n    // ---- per-frame B3 effects (survive the style re-apply above) ----\n    if (bid === \"B3\") {\n      const now = performance.now();\n      // flip the middle node from engineer to agent\n      if (this._flipStart != null) {\n        const el = root.querySelector('[data-node=\"human\"]');\n        if (el) {\n          const t = Math.min((now - this._flipStart) / 750, 1);\n          // single flip: turn to edge-on at the midpoint and back to flat (no double pass)\n          const angle = Math.sin(t * Math.PI) * 90;\n          el.style.transition = \"none\";\n          el.sty  // distill arrows down into the capture panel (step 3)\n      if (step >= 3) {\n        V.lines.push(\n          ln(H3[0],H3[1]+22,H3[0],812,ORANGE,.85,\"1.5 8\",2,\"url(#ah)\",anim),\n          ln(D[0],D[1]+22,D[0],812,ORANGE,.85,\"1.5 8\",2,\"url(#ah)\",anim),\n          ln(RC[0],RC[1]+22,RC[0],812,ORANGE,.85,\"1.5 8\",2,\"url(#ah)\",anim)\n        );\n      }\n\n      // dots (nodes)\n      const dot = (n,fill,stroke,r,op) => ({ cx:n[0], cy:n[1], r:r, fill:fill, stroke:stroke, w:2, opacity:op });\n      [P,H1,H2,H3,A,B,Cn,D,E,F,Gn,RC,FX,VAL].forEach(function(n){\n        if (n === P) { V.dots.push(dot(n, RED+\"2e\", RED, 16, 1)); return; }\n        var big = (n===RC||n===VAL);\n        if (step === 0)        V.dots.push(dot(n, \"#0b0b0b\", NEU, 11, .9));\n        else if (isSurv(n))    V.dots.push(dot(n, LIME+\"2e\", LIME, big?15:13, 1));\n        else                   V.dots.push(dot(n, \"transparent\", RED, 10, .28));\n      });\n\n      // labels\n      const tlbl = (x,y,w,color,show) => ({ position:\"absolute\", left:x+\"px\", top:y+\"px\", width:w+\"px\", textAlign:\"center\", fontSize:\"13px\", letterSpacing:\".18em\", textTransform:\"uppercase\", color:color, transition:T, opacity: show?1:0 });\n      V.treePStyle = tlbl(115, 490, 130, RED, true);\n      V.treeExploreStyle = { position:\"absolute\", left:\"600px\", top:\"110px\", width:\"360px\", textAlign:\"center\", fontSize:\"11px\", letterSpacing:\".26em\", textTransform:\"uppercase\", color:NEU, transition:T, opacity: step===0?1:0 };\n      V.treeRCStyle  = tlbl(1250, 506, 160, LIME, step>=2);\n      V.treeFXStyle  = tlbl(1495, 506, 130, LIME, step>=2);\n      V.treeVALStyle = tlbl(1690, 506, 200, GREEN, step>=2);\n\n      // capture panel\n      V.treePanelStyle = { position:\"absolute\", left:\"210px\", top:\"822px\", width:\"1430px\", padding:\"26px 34px\", border:\"1px solid #5a3a1e\", borderRadius:\"8px\", background:\"linear-gradient(180deg, rgba(255,138,61,.10) 0%, rgba(255,138,61,.03) 100%)\", boxShadow:\"0 0 70px -26px \"+ORANGE, transition:T, opacity: step>=3?1:0, transform: step>=3?\"none\":\"translateY(14px)\" };\n\n      const caps = [\n        \"a problem enters — the engineer and the agent explore possible explanations.\",\n        \"some hypotheses fail; others survive. the dead ends are part of the knowledge.\",\n        \"a root cause is identified, a fix is applied, and the result is validated.\",\n        \"we capture the reasoning artifacts that emerge while solving — the journey itself becomes knowledge.\",\n      ];\n      const capColors = [\"#c9c6bd\", \"#cc8b7f\", GREEN, LIME];\n      setCap(caps[step] || caps[caps.length-1], capColors[step] || LIME);\n    } else if (id === \"B8\") {\n      const cy = N.cy, d = N.d, r = N.r;\n      const TURQ = \"#2fe3cf\", ORANGE = \"#ff8a3d\";\n      const boxW = 720, boxTop = 720, boxH = 196;\n      const anim = \"animation: march .7s linear infinite;\";\n      const expanded = step === 0;\n\n      // substrate (always): context + distilled tacit + divider + system/user labels\n      V.substrateStyle = subBox(true);\n      V.subTitleStyle = lbl(G.sub.x+30, G.sub.y-32, C.dim, true, 12);\n      V.ctxPlatformStyle = { position:\"absolute\", left:\"170px\", top:boxTop+\"px\", width:boxW+\"px\", height:boxH+\"px\", border:`1.5px solid ${C.iris}`, borderRadius:\"8px\", background:`linear-gradient(180deg, ${C.iris}10 0%, #0c0c0e 62%)`, padding:\"22px 30px\", boxShadow:`0 0 60px -12px ${C.iris}, inset 0 0 42px -26px ${C.iris}`, transition:T, opacity:1 };\n      V.tacitDistilledStyle = { position:\"absolute\", left:\"1030px\", top:boxTop+\"px\", width:boxW+\"px\", height:boxH+\"px\", border:`1.5px solid ${ORANGE}`, borderRadius:\"8px\", background:`linear-gradient(180deg, ${ORANGE}12 0%, #0e0b08 62%)`, padding:\"22px 30px\", boxShadow:`0 0 54px -14px ${ORANGE}, inset 0 0 40px -26px ${ORANGE}`, transition:T, opacity:1 };\n      V.lines.push( ln(960, 648, 960, 970, \"#46443d\", .8, \"2 8\", 1.5, \"\") );\n      V.sysLabelStyle  = { position:\"absolute\", left:\"170px\",  top:\"948px\", width:\"720px\", textAlign:\"center\", fontSize:\"11px\", letterSpacing:\".24em\", textTransform:\"uppercase\", color:\"#7d7a72\", transition:T, opacity:1 };\n      V.userLabelStyle = { position:\"absolute\", left:\"1030px\", top:\"948px\", width:\"720px\", textAlign:\"center\", fontSize:\"11px\", letterSpacing:\".24em\", textTransform:\"uppercase\", color:\"#7d7a72\", transition:T, opacity:1 };\n\n      const teamBox = (x,y,w,h) => ({ position:\"absolute\", left:x+\"px\", top:y+\"px\", width:w+\"px\", height:h+\"px\", border:\"1.5px dashed #4c4a43\", borderRadius:\"8px\", background:\"transparent\", transition:T, opacity:1 });\n\n      // node content stays stable so the step-1 fade-out doesn't flash default text\n      V.midTag = \"// agent\"; V.midTitle = \"AI AGENT\"; V.midSub = \"fast retrieval + reasoning\";\n      V.midChip1 = \"fast retrieval\"; V.midChip2 = \"reasoning\"; V.midChip1Style = chip(TURQ); V.midChip2Style = chip(TURQ);\n      V.midSubStyle = { fontSize:\"12px\", color:TURQ, marginTop:\"6px\", transition:T };\n      V.problemTag = \"// the defect\"; V.problemText = \"status bar isn't rendering on the device screen\";\n      V.problemBodyStyle = { fontSize:\"13.5px\", fontWeight:600, color:C.txt, lineHeight:\"1.42\", transition:T };\n      V.outTitle = \"High Accuracy\"; V.outTitleStyle = { fontSize:\"20px\", fontWeight:800, letterSpacing:\".03em\", color:C.green, marginTop:\"4px\", opacity:1, transition:T, textShadow:\"0 0 18px \"+C.green+\"55\" };\n      // the three nodes: visible in step 0, faded out in place for step 1 (\"omitted\")\n      V.humanStyle = circle(N.ex, cy, d, TURQ, expanded);\n      V.problemStyle = circle(N.px, cy, d, C.red, expanded);\n      V.outcomeStyle = circle(N.sx, cy, d, C.green, expanded);\n\n      if (expanded) {\n        // one team: defect → agent → outcome, wrapped in a Team A box\n        V.lines.push(\n          marchArrow(N.px+r+8, cy, N.ex-r-8, cy, C.red, .9),\n          marchArrow(N.ex+r+8, cy, N.sx-r-8, cy, C.green, .9, .3),\n          marchArrow(640, boxTop-6, 884, cy+r-6, C.iris, .9, .32),\n          marchArrow(1300, boxTop-6, 1038, cy+r-6, ORANGE, .9, .32)\n        );\n        V.teamAStyle = teamBox(268, 250, 1382, 322);\n        setCap(\"this is one user — a defect goes in, the agent solves it on shared context plus its own distilled knowledge, and accuracy is high.\", \"#c9c6bd\");\n      } else {\n        // nodes omitted; Team A compressed, Teams B/C stacked above\n        const tx = 300, tw = 1320, th = 54;\n        V.teamAStyle = teamBox(tx, 472, tw, th);\n        V.teamBStyle = teamBox(tx, 392, tw, th);\n        V.teamCStyle = teamBox(tx, 312, tw, th);\n        // context feeds every team — up a rail, then 90° right into each box\n        V.lines.push(\n          ln(250, 716, 250, 339, C.iris, .7, \"1.5 8\", 2, \"\", anim),\n          marchArrow(250, 499, tx, 499, C.iris, .9, .4),\n          marchArrow(250, 419, tx, 419, C.iris, .9, .4),\n          marchArrow(250, 339, tx, 339, C.iris, .9, .4)\n        );\n        // user-managed tacit flows ONLY into Team A\n        V.lines.push( ln(1600, 716, 1600, 528, ORANGE, .9, \"1.5 8\", 2, \"url(#ah)\", anim) );\n\n        if (step >= 2) {\n          V.lines.push( marchArrow(1030, 818, 896, 818, ORANGE, .95, .6) );\n          setCap(\"so promote it — push the user-managed knowledge into the shared context platform, and every user inherits what User A learned.\", C.lime);\n        } else {\n          setCap(\"scale to many users: all pull from the same context, but each user's distilled knowledge stays locked to it — tacit reaches User A alone.\", \"#cc8b7f\");\n        }\n      }\n    } else if (id === \"B9\") {\n      const ORANGE = \"#ff8a3d\";\n      const boxTop = 720, boxH = 196;\n\n      const tBox = (x,y,w,h) => ({ position:\"absolute\", left:x+\"px\", top:y+\"px\", width:w+\"px\", height:h+\"px\", border:\"1.5px dashed #4c4a43\", borderRadius:\"8px\", background:\"transparent\", transition:T, opacity:1 });\n      const tx = 300, tw = 1320, th = 54;\n      V.teamAStyle = tBox(tx, 472, tw, th);\n      V.teamBStyle = tBox(tx, 392, tw, th);\n      V.teamCStyle = tBox(tx, 312, tw, th);\n\n      V.substrateStyle = subBox(true);\n      V.subTitleStyle = lbl(G.sub.x+30, G.sub.y-32, C.dim, true, 12);\n\n      // four elements filling the substrate width, centred: context | hive | governance | tacit\n      const plat = (x,w,color) => ({ position:\"absolute\", left:x+\"px\", top:boxTop+\"px\", width:w+\"px\", height:boxH+\"px\", border:(\"1.5px solid \"+color), borderRadius:\"8px\", background:(\"linear-gradient(180deg, \"+color+\"10 0%, #0c0c0e 62%)\"), display:\"flex\", alignItems:\"center\", justifyContent:\"center\", boxShadow:(\"0 0 54px -14px \"+color+\", inset 0 0 40px -26px \"+color), transition:T, opacity:1 });\n      V.ctxSlimStyle   = plat(130, 497, C.iris);\n      V.hiveStyle      = plat(657, 497, C.lime);\n      V.tacitSlimStyle = plat(1294, 497, ORANGE);\n      V.gateStyle = { position:\"absolute\", left:\"1184px\", top:boxTop+\"px\", width:\"80px\", height:boxH+\"px\", transition:T, opacity:1 };\n\n      // orthogonal multi-segment connector (arrowhead on last leg)\n      const anim = \"animation: march .7s linear infinite;\";\n      const ortho = (pts, color, op, arrow) => {\n        for (var i = 0; i < pts.length - 1; i++) {\n          var last = (i === pts.length - 2);\n          V.lines.push( ln(pts[i][0], pts[i][1], pts[i+1][0], pts[i+1][1], color, op, \"1.5 8\", 2, (last && arrow !== false) ? \"url(#ah)\" : \"\", anim) );\n        }\n      };\n\n      if (step >= 1) {\n        // teams propose into tacit: right, then straight down into the box\n        ortho([[1620,499],[1650,499],[1650,712]], ORANGE, .9);\n        ortho([[1620,419],[1700,419],[1700,712]], ORANGE, .9);\n        ortho([[1620,339],[1750,339],[1750,712]], ORANGE, .9);\n        // context platform feeds every team: straight up, then right into the team\n        ortho([[200,720],[200,325]], C.iris, .9, false);\n        ortho([[200,485],[300,485]], C.iris, .9);\n        ortho([[200,405],[300,405]], C.iris, .9);\n        ortho([[200,325],[300,325]], C.iris, .9);\n        // hive feeds every team: up, left (lifted above substrate label), up, right\n        ortho([[700,720],[700,560],[255,560],[255,353]], C.lime, .9, false);\n        ortho([[255,513],[300,513]], C.lime, .9);\n        ortho([[255,433],[300,433]], C.lime, .9);\n        ortho([[255,353],[300,353]], C.lime, .9);\n        setCap(\"each user proposes its distilled knowledge, and only what clears the governance gate enters the hive as shared, validated skills.\", C.lime);\n      } else {\n        setCap(\"introduce the hive, a shared store of validated skills and memories, with a governance gate guarding what each user can promote.\", \"#c9c6bd\");\n      }\n    } else if (id === \"B10\") {\n      const TURQ = \"#2fe3cf\", ORANGE = \"#ff8a3d\";\n      const anim = \"animation: march .7s linear infinite;\";\n      // orthogonal connector: arrowhead on the final leg\n      const seg = (pts,color,op,arrow) => {\n        for (var i = 0; i < pts.length - 1; i++) {\n          var last = (i === pts.length - 2);\n          V.lines.push( ln(pts[i][0], pts[i][1], pts[i+1][0], pts[i+1][1], color, op, \"1.5 8\", 2, (last && arrow !== false) ? \"url(#ah)\" : \"\", anim) );\n        }\n      };\n      // component box\n      const ab = (x,y,w,h,color,opts) => Object.assign({ position:\"absolute\", left:x+\"px\", top:y+\"px\", width:w+\"px\", height:h+\"px\",\n        border:\"1.5px solid \"+color, borderRadius:\"10px\", background:(\"linear-gradient(180deg, \"+color+\"12 0%, #0b0b0d 72%)\"),\n        boxShadow:(\"0 0 50px -16px \"+color+\", inset 0 0 42px -28px \"+color), padding:\"18px 22px\",\n        display:\"flex\", flexDirection:\"column\", justifyContent:\"center\", transition:T, opacity:1 }, opts||{});\n      const vtag = (y) => ({ position:\"absolute\", left:\"46px\", top:y+\"px\", writingMode:\"vertical-rl\", transform:\"rotate(180deg)\",\n        fontSize:\"11px\", letterSpacing:\".26em\", textTransform:\"uppercase\", color:C.dim, transition:T, opacity:1 });\n      const flbl = (x,y,color) => ({ position:\"absolute\", left:x+\"px\", top:y+\"px\", fontSize:\"11px\", letterSpacing:\".14em\",\n        textTransform:\"uppercase\", color, background:\"#000\", padding:\"1px 7px\", transition:T, opacity:1 });\n\n      V.archTitleStyle = { position:\"absolute\", left:\"0\", top:\"104px\", width:\"1920px\", textAlign:\"center\",\n        fontSize:\"13px\", letterSpacing:\".34em\", textTransform:\"uppercase\", color:\"#7a776f\", transition:T, opacity:1 };\n\n      // WORKSPACE band\n      V.archDefectStyle  = ab(130, 256, 240, 112, \"#9aa8b0\",  { padding:\"0 22px\" });\n      V.archAgentStyle   = ab(720, 220, 480, 188, TURQ,  { alignItems:\"stretch\", boxShadow:\"0 0 64px -14px \"+TURQ+\", inset 0 0 46px -26px \"+TURQ });\n      V.archOutcomeStyle = ab(1550, 256, 240, 112, C.green, { padding:\"0 22px\" });\n\n      // KNOWLEDGE SUBSTRATE band\n      V.archContextStyle = ab(130, 556, 480, 200, C.iris, { justifyContent:\"flex-start\", padding:\"20px 24px\" });\n      V.archTacitStyle   = ab(1310, 556, 480, 200, ORANGE, { justifyContent:\"flex-start\", padding:\"20px 24px\" });\n      V.archGovStyle     = { position:\"absolute\", left:\"1265px\", top:\"865px\", width:\"70px\", height:\"60px\", transition:T, opacity:1 };\n\n      // THE HIVE band\n      V.archHiveStyle = ab(560, 826, 680, 150, C.lime, { justifyContent:\"flex-start\", padding:\"18px 24px\" });\n\n      // layer tags\n      V.archL1Style = vtag(286); V.archL2Style = vtag(568); V.archL3Style = vtag(830);\n\n      // flow labels\n      V.lblRetrieveStyle = flbl(388, 458, C.iris);\n      V.lblDistillStyle  = flbl(1232, 458, ORANGE);\n      V.lblPromoteStyle  = flbl(1566, 838, C.lime);\n      V.lblSharedStyle   = flbl(912, 612, C.lime);\n\n      // ---- flows (all horizontal / vertical, no overlaps) ----\n      // top pipeline: problem -> workspace -> outcome\n      seg([[370,312],[720,312]], \"#9aa8b0\", .9);\n      seg([[1200,312],[1550,312]], C.green, .9);\n      // retrieve: context -> workspace (up, right, up)\n      seg([[370,556],[370,470],[820,470],[820,408]], C.iris, .9);\n      // distill: workspace -> tacit (down, right, down)\n      seg([[1100,408],[1100,470],[1550,470],[1550,556]], ORANGE, .9);\n      // promote: tacit -> governance -> hive (down, left)\n      seg([[1550,756],[1550,895],[1240,895]], ORANGE, .9);\n      // share back: hive -> workspace (straight up the open middle)\n      seg([[900,832],[900,408]], C.lime, .9);\n\n      setCap(\"agents derive on shared context and their own distilled knowledge — what they learn is governed into the hive, and compounds across every user.\", C.lime);\n    }\n\n    const KEB = (s) => s.replace(/[A-Z]/g, (m) => \"-\" + m.toLowerCase());\n    const toCss = (o) => (o && typeof o === \"object\") ? Object.entries(o).map(([k,v]) => `${KEB(k)}:${v}`).join(\";\") : o;\n    Object.keys(V).forEach((k) => { if (k.endsWith(\"Style\")) V[k] = toCss(V[k]); });\n    return V;\n  }\n\n  renderVals() {\n    // stash the live state here — it is reliably fresh inside renderVals, unlike\n    // `this.state` read from the rAF reconciler loop.\n    this._live = { beat: this.state.beat, step: this.state.step, tacitIdx: this.state.tacitIdx };\n    const beat = this.BEATS[this.state.beat];\n    const S = this.compute(beat.id, this.state.step);\n    return {\n      rootRef: this.rootRef, wrapRef: this.wrapRef,\n      onAdvance: () => this.go(1),\n      screenLabel: beat.id, kicker: beat.kicker.replace(/^beat_\\d+\\s*/, \"\"),\n      beatNum: String(this.state.beat).padStart(2, \"0\"), totalNum: \"09\",\n      problemTag: S.problemTag, problemText: S.problemText, stampText: S.stampText, captionText: S.captionText,\n      outTitle: S.outTitle, outTitle2: S.outTitle2, tacitLine: S.tacitLine,\n      midTag: S.midTag, midTitle: S.midTitle, midSub: S.midSub, lines: S.lines, dots: S.dots,\n      midChip1: S.midChip1, midChip2: S.midChip2,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
